        name: granularity
        schema:
          type: string
          nullable: true
          title: Granularité
          enum:
          - daily
          - monthly
          - quarterly
          - transaction
          - weekly
          - yearly
        description: "Granularité\n\n* `transaction` - \U0001F4DD Transaction\n* `daily`
          - \U0001F4C5 Quotidienne\n* `weekly` - \U0001F4C6 Hebdomadaire\n* `monthly`
          - \U0001F5D3️ Mensuelle\n* `quarterly` - \U0001F4CA Trimestrielle\n* `yearly`
          - \U0001F4C8 Annuelle"
