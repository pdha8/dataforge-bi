  /api/data-sources/logs/:
    get:
      operationId: data_sources_logs_list
      description: ViewSet pour DataSourceLog (lecture seule)
      parameters:
      - in: query
        name: data_source
        schema:
          type: string
          format: uuid
        description: ID source
      - in: query
        name: data_source_name
        schema:
          type: string
        description: Nom source
      - in: query
        name: level
        schema:
          type: string
          title: Niveau
          enum:
          - debug
          - error
          - info
          - warning
        description: "Niveau\n\n* `info` - ℹ️ Info\n* `warning` - ⚠️ Warning\n* `error`
          - ❌ Error\n* `debug` - \U0001F41B Debug"
      - in: query
        name: max_execution_time
        schema:
          type: number
          format: float
        description: Temps max (ms)
      - in: query
        name: min_execution_time
        schema:
          type: number
          format: float
        description: Temps min (ms)
