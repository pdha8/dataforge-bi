          enum:
          - type0
          - type1
          - type2
          - type3
          - type4
          - type6
        description: "Type SCD\n\n* `type0` - \U0001F4DD Type 0 - Fixe\n* `type1`
          - \U0001F504 Type 1 - Écrasement\n* `type2` - \U0001F4C5 Type 2 - Versionnage\n*
          `type3` - \U0001F4CA Type 3 - Colonne d'historique\n* `type4` - \U0001F4C1
          Type 4 - Table d'historique\n* `type6` - \U0001F500 Type 6 - Hybride"
