      - in: query
        name: last_refresh_before
        schema:
          type: string
          format: date-time
        description: Refresh avant
      - in: query
        name: max_row_count
        schema:
          type: integer
        description: Lignes max
      - in: query
        name: min_row_count
        schema:
          type: integer
        description: Lignes min
      - in: query
        name: min_size_mb
        schema:
          type: number
        description: Taille min (MB)
      - in: query
        name: name
        schema:
          type: string
        description: Nom
      - name: ordering
        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      - name: per_page
        required: false
        in: query
        description: Nombre de résultats à retourner par page.
        schema:
          type: integer
      - in: query
        name: refresh_frequency
        schema:
          type: string
          title: Fréquence de rafraîchissement
          enum:
          - daily
          - hourly
          - manual
          - monthly
          - realtime
          - weekly
        description: "Fréquence refresh\n\n* `realtime` - ⚡ Temps réel\n* `hourly`
          - \U0001F553 Horaire\n* `daily` - \U0001F4C5 Quotidien\n* `weekly` - \U0001F4C6
          Hebdomadaire\n* `monthly` - \U0001F5D3️ Mensuel\n* `manual` - \U0001F464
